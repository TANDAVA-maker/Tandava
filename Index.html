<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TANDAVA AI v2.0 | Indian Markets</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-void: #020408;
    --bg-panel: #0a1520;
    --accent-cyan: #00d4ff;
    --accent-blue: #0066ff;
    --accent-violet: #7c3aed;
    --accent-red: #ff2a6d;
    --accent-green: #00ff88;
    --text-bright: #e8f4ff;
    --text-dim: #3a5a78;
    --border: rgba(0, 212, 255, 0.12);
  }
  
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  body { 
    background: var(--bg-void); 
    color: var(--text-bright); 
    font-family: 'Rajdhani', sans-serif; 
    height: 100vh; 
    display: flex; 
    flex-direction: column; 
    overflow: hidden; 
  }

  /* TICKER SYSTEM */
  .ticker-bar { background: rgba(2,4,8,0.97); border-bottom: 1px solid var(--border); height: 28px; overflow: hidden; display: flex; align-items: center; z-index: 100; }
  .ticker-track { display: flex; animation: tickerScroll 60s linear infinite; white-space: nowrap; }
  @keyframes tickerScroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .ticker-item { padding: 0 20px; font-family: 'Share Tech Mono', monospace; font-size: 10px; border-right: 1px solid var(--border); }
  .up { color: var(--accent-green); } .dn { color: var(--accent-red); }

  /* HEADER */
  header { padding: 12px 18px; background: var(--bg-panel); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .logo-name { font-family: 'Orbitron'; font-size: 16px; font-weight: 900; letter-spacing: 3px; color: var(--accent-cyan); }

  /* INDIAN MARKETS DASHBOARD */
  .main-content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; display: flex; flex-direction: column; gap: 15px; }
  .market-section { background: rgba(10,21,32,0.6); border: 1px solid var(--border); border-radius: 12px; padding: 15px; }
  .market-section h3 { font-family: 'Orbitron'; font-size: 11px; color: var(--accent-cyan); margin-bottom: 12px; letter-spacing: 1.5px; }
  
  .drill-tile { background: rgba(255,255,255,0.03); padding: 14px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; border-left: 4px solid transparent; }
  .active-idx { border-left-color: var(--accent-cyan); background: rgba(0, 212, 255, 0.05); }
  .tile-sub { font-size: 10px; color: var(--text-dim); margin-top: 4px; font-family: 'Share Tech Mono'; }

  /* ELABORATED VIEW PANEL */
  #intelPanel { display: none; background: #0d1e2e; border: 1px solid var(--accent-cyan); border-radius: 12px; padding: 20px; margin-top: 10px; }
  .intel-title { color: var(--accent-cyan); font-family: 'Orbitron'; font-size: 14px; margin-bottom: 10px; }
  .intel-body { font-size: 13px; line-height: 1.6; color: var(--text-bright); }

  /* INPUT DOCK */
  .input-dock { position: fixed; bottom: 0; width: 100%; padding: 15px; background: var(--bg-void); border-top: 1px solid var(--border); display: flex; gap: 10px; }
  input { flex: 1; background: #0d1e2e; border: 1px solid var(--text-dim); border-radius: 8px; padding: 12px; color: white; font-size: 14px; }
  button { background: var(--accent-cyan); border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; color: #000; }
</style>
</head>
<body>

<div class="ticker-bar">
  <div class="ticker-track" id="tickerTrack"></div>
</div>

<header>
  <div class="logo-name">TANDAVA v2.0</div>
  <div style="font-size: 8px; color: var(--accent-green);">● ONLINE</div>
</header>

<div class="main-content">
  <div class="market-section">
    <h3>SELECT INDEX (INDIA)</h3>
    <div class="drill-tile active-idx" onclick="showSector('Banking')">
      <strong>BANK NIFTY</strong>
      <div class="tile-sub">Spot: 51,437 | PCR: 0.78 (Oversold)</div>
    </div>
    <div class="drill-tile" onclick="alert('IT Sector analysis currently loading...')">
      <strong>NIFTY IT</strong>
      <div class="tile-sub">Spot: 38,521 | Resistance at 39,000</div>
    </div>
  </div>

  <div id="sectorContainer" class="market-section" style="display:none;">
    <h3 id="sectorLabel">SECTOR DETAILS</h3>
    <div class="drill-tile" onclick="elaborate('HDFCBANK')">HDFC BANK <span class="dn">-4.89%</span></div>
    <div class="drill-tile" onclick="elaborate('KOTAK')">KOTAK MAHINDRA <span class="up">+2.15%</span></div>
    <div class="drill-tile" onclick="elaborate('ICICI')">ICICI BANK <span class="up">+1.48%</span></div>
  </div>

  <div id="intelPanel">
    <div class="intel-title" id="intelName">STOCK INTEL</div>
    <div class="intel-body" id="intelContent"></div>
    <button style="margin-top:15px; background:transparent; border:1px solid var(--accent-cyan); color:var(--accent-cyan); width:100%; padding:10px;" onclick="document.getElementById('intelPanel').style.display='none'">CLOSE ANALYSIS</button>
  </div>
</div>

<div class="input-dock">
  <input type="text" placeholder="Analyze market news..." id="userInput">
  <button onclick="alert('Connection established. Please host on GitHub to enable AI chat.')">SCAN</button>
</div>

<script>
  // TICKER DATA
  const TICKERS = [
    {n:"NIFTY 50",p:"22,512",c:"-1.2%",up:false},
    {n:"BANK NIFTY",p:"51,437",c:"+0.4%",up:true},
    {n:"INDIA VIX",p:"25.08",c:"-6.1%",up:false},
    {n:"RELIANCE",p:"2,942",c:"+0.8%",up:true}
  ];
  const track = document.getElementById('tickerTrack');
  track.innerHTML = [...TICKERS, ...TICKERS].map(t => `
    <div class="ticker-item">${t.n}: <span class="${t.up?'up':'dn'}">${t.p} (${t.c})</span></div>
  `).join('');

  // DRILL-DOWN LOGIC
  function showSector(name) {
    document.getElementById('sectorContainer').style.display = 'block';
    document.getElementById('sectorLabel').innerText = name.toUpperCase() + " STOCKS";
  }

  const stockDatabase = {
    'HDFCBANK': `<strong>WHY DOWN?</strong><br>• Board approved external investigation into Dubai branch regulatory lapses.<br>• Termination of 3 employees for 'unethical practices' in mis-selling financial products.<br>• Resignation of Chairman Atanu Chakraborty sparked governance concerns.`,
    'KOTAK': `<strong>WHY UP?</strong><br>• Nomura upgraded stock to 'BUY' with a target of ₹445.<br>• Market views Kotak as a 'Safe Haven' while HDFC Bank faces internal audits.`,
    'ICICI': `<strong>WHY UP?</strong><br>• Analysts maintain it as a 'preferred compounder' due to strong balance sheet health.<br>• Significant institutional buying observed at 1,500 levels.`
  };

  function elaborate(id) {
    const panel = document.getElementById('intelPanel');
    document.getElementById('intelName').innerText = id + " ANALYSIS";
    document.getElementById('intelContent').innerHTML = stockDatabase[id];
    panel.style.display = 'block';
    panel.scrollIntoView({ behavior: 'smooth' });
  }
</script>
</body>
</html>
