<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TANDAVA 5.6 | Lite Active</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
<style>
  :root { --bg-void: #020408; --accent-cyan: #00d4ff; --border: rgba(0, 212, 255, 0.3); }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  body { background:var(--bg-void); color:#e8f4ff; font-family:'Rajdhani',sans-serif; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
  header { display:flex; justify-content:space-between; align-items: center; padding:15px 20px; border-bottom:1px solid var(--border); background:#060d14; }
  .logo-name { font-family:'Orbitron'; font-size:16px; color:var(--accent-cyan); }
  .hdr-btn { background:#0d1e2e; border:2px solid var(--accent-cyan); color:var(--accent-cyan); padding:10px 18px; cursor:pointer; border-radius:8px; font-weight: bold; }
  #messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:15px; }
  .msg-bubble { padding:14px; border-radius:10px; background:#0a1520; border:1px solid var(--border); max-width: 85%; line-height: 1.5; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: rgba(0,212,255,0.1); border-color: var(--accent-cyan); }
  .input-zone { padding:15px; background:#060d14; border-top:1px solid var(--border); display:flex; gap:10px; }
  #userInput { flex:1; background:#0d1e2e; border:1px solid var(--border); color:white; padding:15px; border-radius:8px; font-size: 16px; outline:none; }
  #sendBtn { background:var(--accent-cyan); border:none; color:black; font-weight:bold; padding:0 25px; border-radius:8px; font-family:'Orbitron'; }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:20000; align-items:center; justify-content:center; }
  .modal-content { background:#0a1520; border:2px solid var(--accent-cyan); width:90%; padding:25px; border-radius:15px; }
</style>
</head>
<body>

<header>
  <div class="logo-name">TANDAVA 5.6</div>
  <button class="hdr-btn" onclick="openSettings()">⚙️ ENGINE</button>
</header>

<div id="messages"></div>

<div class="input-zone">
  <input type="text" id="userInput" placeholder="Ask TANDAVA...">
  <button id="sendBtn" onclick="sendMessage()">EXECUTE</button>
</div>

<div class="modal-overlay" id="settingsModal">
  <div class="modal-content">
    <h3 style="color:var(--accent-cyan); text-align:center;">ENGINE CONFIG</h3>
    <input type="password" id="apiKey" style="width:100%; padding:15px; margin-top:20px; background:#0d1e2e; color:white; border:1px solid var(--border); border-radius:8px;" placeholder="Paste Gemini API Key">
    <div style="display:flex; gap:10px; margin-top:20px;">
      <button class="hdr-btn" style="flex:1;" onclick="closeSettings()">CLOSE</button>
      <button class="hdr-btn" style="flex:1;" onclick="saveSettings()">SAVE</button>
    </div>
  </div>
</div>

<script>
window.onload = () => { document.getElementById('apiKey').value = localStorage.getItem('t_key') || ''; };
function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
function saveSettings() {
    localStorage.setItem('t_key', document.getElementById('apiKey').value.trim());
    closeSettings();
}

async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    const key = localStorage.getItem('t_key');
    if (!text || !key) return;

    const msgDiv = document.getElementById('messages');
    msgDiv.innerHTML += `<div class="msg user"><div class="msg-bubble">${text}</div></div>`;
    input.value = '';

    // LITE MODEL PATH (More free quota for unverified users)
    const finalUrl = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash-8b:generateContent?key=${key}`;

    try {
        const response = await fetch(finalUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
        });
        
        const data = await response.json();
        let reply = "";

        if (data.candidates && data.candidates[0].content) {
            reply = data.candidates[0].content.parts[0].text;
        } else if (data.error) {
            reply = "GOOGLE SAYS: " + data.error.message;
        } else {
            reply = "SYSTEM: Response Error. Try a new API key.";
        }
        
        msgDiv.innerHTML += `<div class="msg assistant"><div class="msg-bubble">${reply}</div></div>`;
        msgDiv.scrollTop = msgDiv.scrollHeight;
    } catch (e) {
        msgDiv.innerHTML += `<div class="msg assistant"><div class="msg-bubble" style="color:red;">Network: ${e.message}</div></div>`;
    }
}
</script>
</body>
</html>
