<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TANDAVA 5.8 | Neural Interface</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-void: #020408; --bg-deep: #060d14; --bg-panel: #0a1520; --bg-input: #0d1e2e;
    --accent-cyan: #00d4ff; --accent-blue: #0066ff; --text-bright: #e8f4ff; --text-dim: #3a5a78;
    --border: rgba(0, 212, 255, 0.12); --glow-cyan: 0 0 20px rgba(0, 212, 255, 0.4);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  body { background:var(--bg-void); color:var(--text-bright); font-family:'Rajdhani',sans-serif; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
  
  /* GRID BACKGROUND */
  body::before {
    content:''; position:fixed; inset:0; z-index:0;
    background-image:linear-gradient(rgba(0,212,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.02) 1px,transparent 1px);
    background-size:40px 40px; pointer-events:none;
  }

  /* TICKER */
  .ticker-bar { background:rgba(2,4,8,0.97); border-bottom:1px solid var(--border); height:26px; overflow:hidden; flex-shrink:0; display:flex; align-items:center; z-index:10; }
  .ticker-track { display:flex; animation:tickerScroll 40s linear infinite; white-space:nowrap; }
  @keyframes tickerScroll { 0% { transform:translateX(0); } 100% { transform:translateX(-50%); } }
  .ticker-item { padding:0 20px; font-family:'Share Tech Mono'; font-size:10px; color:var(--accent-cyan); }

  /* HEADER */
  header { padding:12px 20px; border-bottom:1px solid var(--border); background:rgba(6,13,20,0.95); display:flex; justify-content:space-between; align-items:center; z-index:100; }
  .logo-name { font-family:'Orbitron'; font-size:18px; font-weight:900; letter-spacing:3px; color:var(--accent-cyan); }
  .hdr-btn { background:#0d1e2e; border:1px solid var(--accent-cyan); color:var(--accent-cyan); padding:8px 15px; border-radius:5px; font-family:'Share Tech Mono'; font-size:10px; cursor:pointer; }

  /* CHAT AREA */
  #messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:15px; z-index:10; }
  .welcome-screen { text-align:center; margin-top:40px; animation: fadeInUp 0.8s ease; }
  @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .welcome-title { font-family:'Orbitron'; font-size:28px; letter-spacing:5px; margin-bottom:10px; background:linear-gradient(90deg, #00d4ff, #0066ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  
  /* CAPABILITY GRID */
  .cap-grid { display:grid; grid-template-columns: 1fr 1fr; gap:10px; max-width:400px; margin:20px auto; }
  .cap-card { background:rgba(10,21,32,0.8); border:1px solid var(--border); padding:12px; border-radius:8px; cursor:pointer; text-align:left; }
  .cap-card:hover { border-color:var(--accent-cyan); box-shadow:var(--glow-cyan); }
  .cap-label { font-size:11px; font-weight:700; color:var(--accent-cyan); }
  .cap-desc { font-size:9px; color:var(--text-dim); font-family:'Share Tech Mono'; }

  /* BUBBLES */
  .msg-bubble { padding:14px; border-radius:10px; background:rgba(10,21,32,0.9); border:1px solid var(--border); max-width:90%; line-height:1.6; white-space: pre-wrap; }
  .msg.user { align-self:flex-end; border-color:var(--accent-blue); background:rgba(0,102,255,0.05); }

  /* INPUT */
  .input-zone { padding:15px; background:rgba(6,13,20,0.98); border-top:1px solid var(--border); display:flex; gap:10px; z-index:100; }
  #userInput { flex:1; background:var(--bg-input); border:1px solid var(--border); color:white; padding:12px; border-radius:8px; font-family:'Rajdhani'; font-size:16px; outline:none; }
  #sendBtn { background:var(--accent-cyan); border:none; color:black; font-weight:900; padding:0 20px; border-radius:8px; font-family:'Orbitron'; }

  /* SETTINGS MODAL */
  .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center; }
  .modal-content { background:var(--bg-panel); border:2px solid var(--accent-cyan); width:90%; max-width:400px; padding:25px; border-radius:15px; }
</style>
</head>
<body>

<div class="ticker-bar">
  <div class="ticker-track" id="ticker">
    <div class="ticker-item">NIFTY 50: 24,857 (+0.74%)</div>
    <div class="ticker-item">BANKNIFTY: 53,412 (+0.64%)</div>
    <div class="ticker-item">INDIA VIX: 13.42 (-5.95%)</div>
    <div class="ticker-item">USD/INR: 84.32 (+0.14%)</div>
  </div>
</div>

<header>
  <div class="logo-name">TANDAVA 5.8</div>
  <button class="hdr-btn" onclick="openSettings()">// ENGINE CONFIG</button>
</header>

<div id="messages">
  <div class="welcome-screen" id="welcome">
    <div class="welcome-title">TANDAVA</div>
    <p style="font-family:'Share Tech Mono'; font-size:10px; color:var(--text-dim);">NEURAL INTERFACE v5.8 // ALL SYSTEMS ONLINE</p>
    
    <div class="cap-grid">
      <div class="cap-card" onclick="quickAsk('Nifty 1-minute scalping strategy')">
        <div class="cap-label">📊 TRADE STRATEGY</div>
        <div class="cap-desc">EMA · RSI · Scalping</div>
      </div>
      <div class="cap-card" onclick="quickAsk('Explain RSI for Binary Options')">
        <div class="cap-label">🧠 DEEP ANALYSIS</div>
        <div class="cap-desc">Momentum · Divergence</div>
      </div>
    </div>
  </div>
</div>

<div class="input-zone">
  <input type="text" id="userInput" placeholder="// enter query...">
  <button id="sendBtn" onclick="sendMessage()">EXECUTE</button>
</div>

<div class="modal" id="settingsModal">
  <div class="modal-content">
    <h3 style="color:var(--accent-cyan); font-family:'Orbitron'; text-align:center;">CONFIG</h3>
    <input type="password" id="apiKey" style="width:100%; padding:15px; margin-top:20px; background:#0d1e2e; color:white; border:1px solid var(--accent-cyan); border-radius:8px;" placeholder="Paste Gemini Key">
    <button class="hdr-btn" style="width:100%; margin-top:20px; padding:15px;" onclick="saveSettings()">SAVE & INITIALIZE</button>
  </div>
</div>

<script>
window.onload = () => { 
  document.getElementById('apiKey').value = localStorage.getItem('t_key') || '';
  // Duplicate ticker for smooth loop
  const ticker = document.getElementById('ticker');
  ticker.innerHTML += ticker.innerHTML;
};

function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
function saveSettings() {
  localStorage.setItem('t_key', document.getElementById('apiKey').value.trim());
  document.getElementById('settingsModal').style.display = 'none';
}

function quickAsk(q) {
  document.getElementById('userInput').value = q;
  sendMessage();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  const key = localStorage.getItem('t_key');
  if (!text || !key) return;

  document.getElementById('welcome').style.display = 'none';
  const msgDiv = document.getElementById('messages');
  msgDiv.innerHTML += `<div class="msg user"><div class="msg-bubble">${text}</div></div>`;
  input.value = '';

  const url = `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${key}`;

  try {
    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
    });
    const data = await response.json();
    let reply = (data.candidates) ? data.candidates[0].content.parts[0].text : "ERROR: Key invalid or quota reached.";
    msgDiv.innerHTML += `<div class="msg ai"><div class="msg-bubble">${reply}</div></div>`;
    msgDiv.scrollTop = msgDiv.scrollHeight;
  } catch (e) {
    msgDiv.innerHTML += `<div class="msg ai"><div class="msg-bubble" style="color:red;">SYSTEM ERROR: ${e.message}</div></div>`;
  }
}
</script>
</body>
</html>
