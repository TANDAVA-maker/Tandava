<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TANDAVA AI | Indian Markets Drill-Down</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020408; --panel: #0a1520; --cyan: #00d4ff; --red: #ff2a6d; --green: #00ff88;
            --text: #e8f4ff; --dim: #3a5a78; --border: rgba(0,212,255,0.15);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace; line-height: 1.4; overflow-x: hidden; }

        /* HEADER & TICKER */
        header { background: var(--panel); border-bottom: 1px solid var(--border); padding: 12px; position: sticky; top: 0; z-index: 100; }
        .ticker-wrap { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .ticker-item { white-space: nowrap; font-size: 11px; display: flex; gap: 6px; }
        .up { color: var(--green); } .dn { color: var(--red); }

        /* MAIN NAVIGATION ICON */
        .main-nav { padding: 20px; display: flex; justify-content: center; }
        .live-market-btn { 
            background: linear-gradient(45deg, #0a1520, #162a3d); 
            border: 1px solid var(--cyan); 
            padding: 20px 40px; 
            border-radius: 15px; 
            text-align: center; 
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0,212,255,0.2);
        }
        .live-market-btn h2 { font-family: 'Orbitron'; font-size: 18px; color: var(--cyan); margin-bottom: 5px; }

        /* DRILL-DOWN CONTAINER */
        .drill-container { padding: 15px; display: none; flex-direction: column; gap: 15px; padding-bottom: 100px; }
        .col-section { background: rgba(10,21,32,0.8); border: 1px solid var(--border); border-radius: 12px; padding: 15px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .col-section h3 { font-family: 'Orbitron'; font-size: 11px; color: var(--cyan); margin-bottom: 12px; letter-spacing: 1.5px; }
        
        /* TILES */
        .tile { 
            background: rgba(255,255,255,0.03); 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 10px; 
            border-left: 4px solid transparent; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .tile:active { background: rgba(0,212,255,0.1); }
        .idx-tile { border-left-color: var(--cyan); }
        .tile-info { font-size: 10px; color: var(--dim); margin-top: 4px; }

        /* NEWS PANEL */
        #newsPanel { 
            display: none; 
            background: #0d1e2e; 
            border: 1px solid var(--cyan); 
            border-radius: 12px; 
            padding: 20px; 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            height: 60vh; 
            overflow-y: auto; 
            z-index: 1001; 
            animation: slideUp 0.4s cubic-bezier(0, 0.55, 0.45, 1);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .close-btn { background: var(--cyan); color: #000; border: none; padding: 10px; border-radius: 5px; width: 100%; margin-top: 20px; font-weight: bold; }

        .news-item { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .news-date { font-size: 10px; color: var(--cyan); margin-bottom: 4px; }
    </style>
</head>
<body>

<header>
    <div class="ticker-wrap">
        <div class="ticker-item">NIFTY 50: <span class="dn">22,512 (-2.60%)</span></div>
        <div class="ticker-item">BANK NIFTY: <span class="dn">51,437 (-2.4%)</span></div>
        <div class="ticker-item">INDIA VIX: <span class="up">17.8 (+12%)</span></div>
    </div>
</header>

<div class="main-nav" id="mainNav">
    <div class="live-market-btn" onclick="startDrillDown()">
        <h2>📈 LIVE MARKETS</h2>
        <p style="font-size: 10px; color: var(--dim);">TAP TO SCAN INDIAN INDICES</p>
    </div>
</div>

<div class="drill-container" id="drillContainer">
    <div class="col-section" id="indexSection">
        <h3>SELECT INDEX</h3>
        <div class="tile idx-tile" onclick="openSector('Banking')">
            <div><strong>NIFTY BANK</strong><div class="tile-info">PCR: 0.69 (Bearish/Oversold)</div></div>
            <div class="dn">-2.40%</div>
        </div>
        <div class="tile idx-tile" onclick="alert('Nifty 50 Drill-down Coming Soon')">
            <div><strong>NIFTY 50</strong><div class="tile-info">Support: 22,470 | Res: 23,000</div></div>
            <div class="dn">-2.60%</div>
        </div>
        <div class="tile idx-tile">
            <div><strong>SENSEX</strong><div class="tile-info">Resistance: 74,500</div></div>
            <div class="dn">-2.46%</div>
        </div>
    </div>

    <div class="col-section" id="sectorSection" style="display:none;">
        <h3 id="sectorTitle">STOCKS</h3>
        <div id="stockList"></div>
        <button class="close-btn" style="background:transparent; color:var(--cyan); border:1px solid var(--cyan);" onclick="backToIndex()">← BACK TO INDICES</button>
    </div>
</div>

<div id="newsPanel">
    <h3 id="newsHeader" style="font-family:'Orbitron'; color:var(--cyan); margin-bottom:15px;">INTEL REPORT</h3>
    <div id="newsContent"></div>
    <button class="close-btn" onclick="closeNews()">MINIMIZE ANALYTICS</button>
</div>

<script>
    // DATA STORE (March 24, 2026 Context)
    const marketData = {
        'Banking': [
            { name: 'HDFC BANK', symbol: 'HDFCBANK', price: '742.30', change: '-4.89%' },
            { name: 'ICICI BANK', symbol: 'ICICIBANK', price: '1,225.00', change: '-1.64%' },
            { name: 'KOTAK BANK', symbol: 'KOTAKBANK', price: '1,782.00', change: '+1.20%' }
        ]
    };

    const stockNews = {
        'HDFCBANK': [
            { date: 'MAR 24, 2026', text: "Board has appointed external law firms to review former Chairman Atanu Chakraborty's resignation letter." },
            { date: 'MAR 24, 2026', text: "Bank confirmed firing 3 employees at Dubai branch after internal probe into regulatory lapses." },
            { date: 'MAR 23, 2026', text: "Stock fell 4.89% on Monday following governance concerns and leadership changes." }
        ],
        'ICICIBANK': [
            { date: 'MAR 20, 2026', text: "Tax authorities slapped a ₹769 Crore GST demand notice for alleged short payment." },
            { date: 'MAR 24, 2026', text: "Stock showing relative strength despite GST demand, trading near 1,225 support." }
        ]
    };

    // LOGIC
    function startDrillDown() {
        document.getElementById('mainNav').style.display = 'none';
        document.getElementById('drillContainer').style.display = 'flex';
    }

    function openSector(sector) {
        document.getElementById('indexSection').style.display = 'none';
        document.getElementById('sectorSection').style.display = 'block';
        document.getElementById('sectorTitle').innerText = sector.toUpperCase() + " STOCKS";
        
        const list = document.getElementById('stockList');
        list.innerHTML = '';
        marketData[sector].forEach(s => {
            const isUp = s.change.includes('+');
            list.innerHTML += `
                <div class="tile" onclick="showNews('${s.symbol}')">
                    <div><strong>${s.name}</strong><div class="tile-info">LTP: ₹${s.price}</div></div>
                    <div class="${isUp?'up':'dn'}">${s.change}</div>
                </div>`;
        });
    }

    function backToIndex() {
        document.getElementById('sectorSection').style.display = 'none';
        document.getElementById('indexSection').style.display = 'block';
    }

    function showNews(symbol) {
        const panel = document.getElementById('newsPanel');
        const content = document.getElementById('newsContent');
        document.getElementById('newsHeader').innerText = symbol + " ANALYTICS";
        
        const news = stockNews[symbol] || [{date:'N/A', text:'No fresh news available. Showing steady historical trends.'}];
        content.innerHTML = news.map(n => `
            <div class="news-item">
                <div class="news-date">${n.date}</div>
                <div class="news-text">${n.text}</div>
            </div>
        `).join('');
        
        panel.style.display = 'block';
    }

    function closeNews() {
        document.getElementById('newsPanel').style.display = 'none';
    }
</script>
</body>
</html>
