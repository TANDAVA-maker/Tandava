<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TANDAVA AI v4.1 | Universal Fix</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600&family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap" rel="stylesheet">
<style>
  :root { --bg-void: #020408; --bg-deep: #060d14; --bg-panel: #0a1520; --bg-input: #0d1e2e; --accent-cyan: #00d4ff; --text-bright: #e8f4ff; --text-dim: #3a5a78; --border: rgba(0, 212, 255, 0.15); }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  body { background:var(--bg-void); color:var(--text-bright); font-family:'Rajdhani',sans-serif; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
  header { display:flex; justify-content:space-between; align-items: center; padding:15px 20px; border-bottom:1px solid var(--border); background:rgba(6,13,20,0.95); z-index:50; }
  .logo-name { font-family:'Orbitron',monospace; font-size:16px; color:var(--accent-cyan); letter-spacing:2px; }
  .hdr-btn { background:var(--bg-input); border:1px solid var(--accent-cyan); color:var(--accent-cyan); padding:10px 18px; cursor:pointer; font-family:'Share Tech Mono'; border-radius:6px; font-weight: bold; }
  #messages { flex:1; overflow-y:auto; padding:20px; padding-bottom: 100px; display:flex; flex-direction:column; gap:15px; }
  .msg { display:flex; gap:10px; max-width:85%; animation:fadeIn 0.3s ease; margin-bottom: 10px; }
  .msg-bubble { padding:12px 16px; border-radius:8px; font-size:15px; line-height:1.5; background:var(--bg-panel); border:1px solid var(--border); word-wrap: break-word; white-space: pre-wrap; }
  .msg.user { align-self:flex-end; }
  .msg.user .msg-bubble { background:rgba(0, 212, 255, 0.1); border-color:var(--accent-cyan); }
  .input-zone { position: fixed; bottom: 0; left: 0; right: 0; padding:15px 20px; background:var(--bg-deep); border-top:1px solid var(--border); display:flex; gap:10px; z-index:100; }
  #userInput { flex:1; background:var(--bg-input); border:1px solid var(--border); color:white; padding:12px; border-radius:6px; font-size: 16px; outline:none; }
  #sendBtn { background:var(--accent-cyan); border:none; color:black; font-weight:bold; padding:0 20px; border-radius:6px; font-family:'Orbitron'; }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; }
  .modal-content { background:var(--bg-panel); border:1px solid var(--accent-cyan); width:92%; max-width: 400px; padding:25px; border-radius:12px; }
</style>
</head>
<body>

<header>
  <div class="logo-name">TANDAVA 4.1</div>
  <button class="hdr-btn" onclick="openSettings()">⚙️ ENGINE</button>
</header>

<div id="messages"></div>

<div class="input-zone">
  <input type="text" id="userInput" placeholder="Ask TANDAVA anything...">
  <button id="sendBtn" onclick="sendMessage()">EXECUTE</button>
</div>

<div class="modal-overlay" id="settingsModal">
  <div class="modal-content">
    <h3 style="color:var(--accent-cyan); text-align:center; font-family:'Orbitron';">ENGINE CONFIG</h3>
    <input type="text" id="apiUrl" placeholder="URL" style="width:100%; padding:10px; margin-top:10px; background:#0d1e2e; color:white; border:1px solid #3a5a78;">
    <input type="text" id="apiModel" placeholder="Model" style="width:100%; padding:10px; margin-top:10px; background:#0d1e2e; color:white; border:1px solid #3a5a78;">
    <input type="password" id="apiKey" placeholder="Paste Key" style="width:100%; padding:10px; margin-top:10px; background:#0d1e2e; color:white; border:1px solid #3a5a78;">
    <div style="display:flex; gap:10px; margin-top:20px;">
      <button class="hdr-btn" style="flex:1;" onclick="closeSettings()">CLOSE</button>
      <button class="hdr-btn" style="flex:1;" onclick="saveSettings()">SAVE</button>
    </div>
  </div>
</div>

<script>
window.onload = () => {
    document.getElementById('apiUrl').value = localStorage.getItem('t_url') || 'https://generativelanguage.googleapis.com/v1beta/openai/chat/completions';
    document.getElementById('apiModel').value = localStorage.getItem('t_model') || 'gemini-1.5-flash';
    document.getElementById('apiKey').value = localStorage.getItem('t_key') || '';
};

function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }

function saveSettings() {
    localStorage.setItem('t_url', document.getElementById('apiUrl').value);
    localStorage.setItem('t_model', document.getElementById('apiModel').value);
    localStorage.setItem('t_key', document.getElementById('apiKey').value);
    closeSettings();
}

async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    const msgDiv = document.getElementById('messages');
    msgDiv.innerHTML += `<div class="msg user"><div class="msg-bubble">${text}</div></div>`;
    input.value = '';

    const url = localStorage.getItem('t_url');
    const model = localStorage.getItem('t_model');
    const key = localStorage.getItem('t_key');

    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
            body: JSON.stringify({ model: model, messages: [{role: "user", content: text}] })
        });
        const data = await response.json();
        
        let reply = "";
        // THE UNIVERSAL DETECTION FIX:
        if (data.choices && data.choices[0] && data.choices[0].message) {
            reply = data.choices[0].message.content;
        } else if (data.candidates && data.candidates[0] && data.candidates[0].content) {
            reply = data.candidates[0].content.parts[0].text;
        } else {
            reply = "ERROR: " + (data.error ? data.error.message : "Unrecognized response format.");
        }
        
        msgDiv.innerHTML += `<div class="msg assistant"><div class="msg-bubble">${reply}</div></div>`;
        msgDiv.scrollTop = msgDiv.scrollHeight;
    } catch (e) {
        msgDiv.innerHTML += `<div class="msg assistant"><div class="msg-bubble" style="color:red;">Error: ${e.message}</div></div>`;
    }
}
</script>
</body>
</html>
