<script>
// UPDATED: This function now only fills the box, it does NOT send the message
function quickAsk(topic) {
  const input = document.getElementById('userInput');
  
  // Set the text based on which icon was clicked
  if(topic === 'market') input.value = "Analyze Nifty current trend: ";
  if(topic === 'strategy') input.value = "Explain 1-min strategy for: ";
  if(topic === 'code') input.value = "Write Python code for: ";
  if(topic === 'tamil') input.value = "சந்தை பற்றி விளக்கு: ";
  if(topic === 'news') input.value = "Latest news about: ";
  if(topic === 'greeks') input.value = "Calculate Greeks for: ";
  
  // Focus the input so you can start typing immediately
  input.focus();
  
  // Optional: Scroll to the input area on mobile
  input.scrollIntoView({ behavior: 'smooth' });
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  const key = localStorage.getItem('t_key');
  
  if (!text || !key) return;

  // Hide the welcome screen only when the first real message is sent
  const welcome = document.getElementById('welcome');
  if(welcome) welcome.style.display = 'none';

  const msgDiv = document.getElementById('messages');
  msgDiv.innerHTML += `<div class="msg-bubble" style="align-self:flex-end; border-color:var(--accent-blue);">${text}</div>`;
  input.value = '';

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
    });
    const data = await res.json();
    const reply = data.candidates ? data.candidates[0].content.parts[0].text : "Error: Key/Quota issue.";
    msgDiv.innerHTML += `<div class="msg-bubble">${reply}</div>`;
    
    // Auto-scroll to show the new reply
    msgDiv.scrollTop = msgDiv.scrollHeight;
  } catch (e) {
    msgDiv.innerHTML += `<div style="color:red; padding:10px;">Error: ${e.message}</div>`;
  }
}
</script>

<div class="cap-grid">
  <div class="cap-card" onclick="quickAsk('market')">
    <div style="font-size:18px;">📈</div><div class="cap-label">Live Markets</div>
  </div>
  <div class="cap-card" onclick="quickAsk('strategy')">
    <div style="font-size:18px;">📊</div><div class="cap-label">Trade Strategy</div>
  </div>
  <div class="cap-card" onclick="quickAsk('code')">
    <div style="font-size:18px;">⌨️</div><div class="cap-label">Code Helper</div>
  </div>
  <div class="cap-card" onclick="quickAsk('tamil')">
    <div style="font-size:18px;">🌐</div><div class="cap-label">Tamil Mode</div>
  </div>
</div>
