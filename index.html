<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TANDAVA AI v2.5 | Pro Trader Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-void: #020408; --bg-deep: #060d14; --bg-panel: #0a1520; --bg-input: #0d1e2e;
    --accent-cyan: #00d4ff; --accent-blue: #0066ff; --accent-violet: #7c3aed;
    --accent-red: #ff2a6d; --accent-green: #00ff88;
    --text-bright: #e8f4ff; --text-mid: #8ab0cc; --text-dim: #3a5a78;
    --border: rgba(0, 212, 255, 0.12); --border-bright: rgba(0, 212, 255, 0.35);
    --glow-cyan: 0 0 20px rgba(0, 212, 255, 0.4); --glow-soft: 0 0 40px rgba(0, 102, 255, 0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg-void); color:var(--text-bright); font-family:'Rajdhani',sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; position:relative; }
  body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(0,212,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.025) 1px,transparent 1px); background-size:40px 40px; animation:gridShift 20s linear infinite; pointer-events:none; z-index:0; }
  body::after { content:''; position:fixed; inset:0; background:radial-gradient(ellipse at 20% 50%,rgba(124,58,237,0.06) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(0,212,255,0.05) 0%,transparent 50%),radial-gradient(ellipse at 60% 80%,rgba(0,102,255,0.04) 0%,transparent 50%); pointer-events:none; z-index:0; }
  @keyframes gridShift{0%{transform:translateY(0)}100%{transform:translateY(40px)}}

  /* TICKER */
  .ticker-bar { position:relative; z-index:20; background:rgba(2,4,8,0.97); border-bottom:1px solid rgba(0,212,255,0.08); height:26px; overflow:hidden; flex-shrink:0; display:flex; align-items:center; }
  .ticker-track { display:flex; animation:tickerScroll 50s linear infinite; white-space:nowrap; width:max-content; }
  @keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
  .ticker-item { display:inline-flex; align-items:center; gap:6px; padding:0 18px; font-family:'Share Tech Mono',monospace; font-size:9px; border-right:1px solid rgba(0,212,255,0.07); }
  .ticker-name { color:var(--text-dim); letter-spacing:1px; }
  .ticker-price { color:var(--text-bright); font-weight:600; }
  .ticker-change.up { color:var(--accent-green); }
  .ticker-change.dn { color:var(--accent-red); }

  /* HEADER & CONTROLS */
  header { position:relative; z-index:10; display:flex; align-items:center; justify-content:space-between; padding:9px 18px; border-bottom:1px solid var(--border); background:rgba(6,13,20,0.93); backdrop-filter:blur(12px); flex-shrink:0; }
  .logo-block { display:flex; align-items:center; gap:10px; }
  .logo-icon { width:32px; height:32px; }
  .logo-icon svg { width:100%; height:100%; filter:drop-shadow(0 0 8px rgba(0,212,255,0.6)); }
  .logo-text { display:flex; flex-direction:column; line-height:1; }
  .logo-name { font-family:'Orbitron',monospace; font-size:15px; font-weight:900; letter-spacing:4px; background:linear-gradient(90deg,var(--accent-cyan),var(--accent-blue)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .logo-sub { font-family:'Share Tech Mono',monospace; font-size:7px; color:var(--text-dim); letter-spacing:3px; margin-top:2px; }
  
  .header-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
  .status-dot { display:flex; align-items:center; gap:5px; font-family:'Share Tech Mono',monospace; font-size:8px; color:var(--text-dim); letter-spacing:1px; margin-right:5px;}
  .dot { width:6px; height:6px; border-radius:50%; background:var(--accent-green); box-shadow:0 0 8px var(--accent-green); animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  
  .hdr-btn { display:flex; align-items:center; gap:5px; background:transparent; border:1px solid var(--border); color:var(--text-dim); font-family:'Share Tech Mono',monospace; font-size:7px; letter-spacing:1px; padding:4px 7px; border-radius:3px; cursor:pointer; transition:all 0.2s; user-select:none;}
  .hdr-btn:hover { border-color:rgba(0,212,255,0.3); color:var(--accent-cyan); }
  .hdr-btn.on { border-color:rgba(0,102,255,0.4); color:#6699ff; background:rgba(0,102,255,0.08); }
  .toggle-dot { width:5px; height:5px; border-radius:50%; background:var(--text-dim); transition:background 0.2s; }
  .hdr-btn.on .toggle-dot { background:#6699ff; box-shadow:0 0 6px #6699ff; }

  /* CHAT AREA */
  .chat-wrapper { flex:1; display:flex; flex-direction:column; position:relative; z-index:5; overflow:hidden; min-height:0; }
  #messages { flex:1; overflow-y:auto; padding:18px 18px; display:flex; flex-direction:column; gap:16px; scroll-behavior:smooth; min-height:0; }
  #messages::-webkit-scrollbar{width:3px}
  #messages::-webkit-scrollbar-track{background:transparent}
  #messages::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.2);border-radius:2px}

  /* WELCOME SCREEN */
  .welcome { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; text-align:center; padding:16px 20px; animation:fadeInUp 0.8s ease forwards; min-height:280px; }
  @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .welcome-avatar { width:72px; height:72px; margin-bottom:14px; }
  .welcome-avatar svg { width:100%; height:100%; filter:drop-shadow(0 0 18px rgba(0,212,255,0.5)); animation:float 4s ease-in-out infinite; }
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .welcome-title { font-family:'Orbitron',monospace; font-size:24px; font-weight:900; letter-spacing:6px; background:linear-gradient(135deg,var(--accent-cyan),var(--accent-blue),var(--accent-violet)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:5px; }
  .welcome-sub { font-size:10px; color:var(--text-mid); letter-spacing:2px; margin-bottom:20px; font-family:'Share Tech Mono',monospace; }
  
  .capability-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; max-width:560px; width:100%; }
  .cap-card { background:rgba(10,21,32,0.8); border:1px solid var(--border); border-radius:6px; padding:9px 10px; text-align:left; cursor:pointer; transition:all 0.2s ease; position:relative; overflow:hidden; }
  .cap-card:hover { border-color:var(--border-bright); box-shadow:var(--glow-cyan); transform:translateY(-2px); }
  .cap-icon { font-size:15px; margin-bottom:4px; }
  .cap-label { font-size:9px; font-weight:600; color:var(--text-bright); letter-spacing:1px; text-transform:uppercase; }
  .cap-desc { font-size:8px; color:var(--text-dim); margin-top:2px; font-family:'Share Tech Mono',monospace; }

  /* MESSAGES */
  .msg { display:flex; gap:9px; animation:msgIn 0.3s ease forwards; max-width:860px; width:100%; }
  @keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .msg.user { flex-direction:row-reverse; align-self:flex-end; }
  .msg.assistant { align-self:flex-start; }
  .msg-avatar { width:28px; height:28px; border-radius:4px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:10px; font-family:'Orbitron',monospace; font-weight:700; }
  .msg.user .msg-avatar { background:linear-gradient(135deg,var(--accent-violet),var(--accent-blue)); color:white; }
  .msg.assistant .msg-avatar { background:linear-gradient(135deg,#001a2e,#003a5c); border:1px solid rgba(0,212,255,0.3); box-shadow:0 0 10px rgba(0,212,255,0.2); }
  .msg-avatar svg { width:14px; height:14px; filter:drop-shadow(0 0 4px rgba(0,212,255,0.8)); }
  .msg-bubble { max-width:calc(100% - 40px); padding:9px 13px; border-radius:6px; font-size:14px; line-height:1.7; letter-spacing:0.3px; }
  .msg.user .msg-bubble { background:linear-gradient(135deg,rgba(124,58,237,0.2),rgba(0,102,255,0.15)); border:1px solid rgba(124,58,237,0.3); color:var(--text-bright); border-radius:6px 2px 6px 6px; }
  .msg.assistant .msg-bubble { background:rgba(10,21,32,0.9); border:1px solid var(--border); color:var(--text-bright); border-radius:2px 6px 6px 6px; border-left:2px solid rgba(0,212,255,0.4); }
  .msg-bubble pre { background:rgba(0,0,0,0.5); border:1px solid rgba(0,212,255,0.15); border-radius:4px; padding:10px; overflow-x:auto; margin:8px 0; color:#7dffb3; font-family:'Share Tech Mono',monospace;}
  .msg-bubble code { font-family:'Share Tech Mono',monospace; color:var(--accent-cyan); background:rgba(0,212,255,0.08); padding:1px 5px; border-radius:3px; }
  .msg-bubble h3 { color:var(--accent-cyan); font-size:13px; margin:8px 0 4px; font-family:'Orbitron',monospace; }
  
  /* TRADINGVIEW CHART CONTAINER */
  .tv-chart-container { width: 100%; height: 350px; margin-top: 10px; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }

  /* INPUT AREA */
  .input-zone { position:relative; z-index:10; padding:9px 16px 13px; background:rgba(6,13,20,0.97); border-top:1px solid var(--border); backdrop-filter:blur(12px); flex-shrink:0; }
  .input-container { display:flex; align-items:flex-end; gap:7px; background:var(--bg-input); border:1px solid var(--border); border-radius:8px; padding:8px 8px 8px 14px; }
  .input-container:focus-within { border-color:rgba(0,212,255,0.4); box-shadow:0 0 0 1px rgba(0,212,255,0.1),var(--glow-soft); }
  #userInput { flex:1; background:transparent; border:none; outline:none; color:var(--text-bright); font-family:'Rajdhani',sans-serif; font-size:14px; resize:none; max-height:100px; min-height:20px; }
  #sendBtn { width:32px; height:32px; border-radius:5px; background:linear-gradient(135deg,var(--accent-blue),var(--accent-cyan)); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  #sendBtn svg { width:13px; height:13px; fill:white; }
  .action-btn { width:30px; height:30px; border-radius:5px; border:1px solid var(--border); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-dim); }
  .action-btn:hover { border-color:var(--accent-cyan); color:var(--accent-cyan); }
  
  /* SETTINGS MODAL */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(2,4,8,0.85); backdrop-filter:blur(5px); z-index:100; align-items:center; justify-content:center; }
  .modal-content { background:var(--bg-panel); border:1px solid var(--accent-cyan); box-shadow:var(--glow-cyan); border-radius:8px; width:340px; padding:20px; animation:msgIn 0.3s ease; }
  .modal-title { font-family:'Orbitron',monospace; color:var(--accent-cyan); font-size:16px; margin-bottom:15px; border-bottom:1px solid var(--border); padding-bottom:10px; }
  .modal-input { width:100%; padding:10px; background:var(--bg-input); border:1px solid var(--border); color:white; font-family:'Share Tech Mono',monospace; border-radius:4px; margin-bottom:15px; outline:none;}
  .modal-input:focus { border-color:var(--accent-cyan); }
  .modal-btn-row { display:flex; justify-content:flex-end; gap:10px; }
  .modal-btn { padding:6px 12px; background:transparent; border:1px solid var(--text-dim); color:var(--text-dim); cursor:pointer; font-family:'Share Tech Mono',monospace; border-radius:4px; }
  .modal-btn.save { border-color:var(--accent-cyan); color:var(--accent-cyan); background:rgba(0,212,255,0.1); }
  .modal-btn:hover { filter:brightness(1.5); }

</style>
<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

<div class="ticker-bar"><div class="ticker-track" id="tickerTrack"></div></div>

<header>
  <div class="logo-block">
    <div class="logo-icon">
      <svg viewBox="0 0 40 40" fill="none">
        <polygon points="20,2 38,12 38,28 20,38 2,28 2,12" stroke="#00d4ff" stroke-width="1.5" fill="rgba(0,212,255,0.05)"/>
        <circle cx="20" cy="20" r="5" fill="#00d4ff" opacity="0.9"/>
        <line x1="20" y1="2" x2="20" y2="8" stroke="#00d4ff" stroke-width="1.5"/>
        <line x1="20" y1="32" x2="20" y2="38" stroke="#00d4ff" stroke-width="1.5"/>
      </svg>
    </div>
    <div class="logo-text">
      <span class="logo-name">TANDAVA</span>
      <span class="logo-sub">Neural Interface v2.5</span>
    </div>
  </div>
  <div class="header-right">
    <div class="status-dot"><span class="dot"></span><span>ONLINE</span></div>
    
    <div class="hdr-btn" id="ttsToggle" onclick="toggleAudio()">
      <span class="toggle-dot"></span><span id="ttsLabel">AUDIO OFF</span>
    </div>
    <div class="hdr-btn" id="wsToggle" onclick="toggleWebSearch()">
      <span class="toggle-dot"></span><span id="wsLabel">WEB OFF</span>
    </div>
    <button class="hdr-btn" onclick="openSettings()">⚙️ KEYS</button>
    <button class="hdr-btn" onclick="newChat()">// NEW</button>
  </div>
</header>

<div class="chat-wrapper">
  <div id="messages">
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-title">TANDAVA</div>
      <div class="welcome-sub">// v2.5 · TRADING INTELLIGENCE ACTIVE</div>
      <div class="capability-grid">
        <div class="cap-card" onclick="quickPrompt('Show chart for NIFTY')">
          <div class="cap-icon">📈</div><div class="cap-label">Live Chart</div><div class="cap-desc">Interactive TradingView</div>
        </div>
        <div class="cap-card" onclick="quickPrompt('Explain ORB strategy for Nifty options')">
          <div class="cap-icon">📊</div><div class="cap-label">Trade Strategy</div><div class="cap-desc">ORB · OI · Options</div>
        </div>
        <div class="cap-card" onclick="document.getElementById('fileInput').click()">
          <div class="cap-icon">📁</div><div class="cap-label">Analyze Data</div><div class="cap-desc">Upload CSV/Images</div>
        </div>
        <div class="cap-card" onclick="startVoice()">
          <div class="cap-icon">🎙️</div><div class="cap-label">Voice Control</div><div class="cap-desc">Hands-free input</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="input-zone">
  <div class="input-container">
    <textarea id="userInput" rows="1" placeholder="// enter command or query..."></textarea>
    <button class="action-btn" onclick="startVoice()">🎙️</button>
    <button class="action-btn" onclick="document.getElementById('fileInput').click()">📎</button>
    <button id="sendBtn" onclick="sendMessage()"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
  </div>
</div>
<input type="file" id="fileInput" style="display:none;" multiple>

<div class="modal-overlay" id="settingsModal">
  <div class="modal-content">
    <div class="modal-title">SYSTEM SETTINGS</div>
    <label style="font-size: 10px; color: var(--text-dim); font-family: 'Share Tech Mono';">ANTHROPIC API KEY (Saved locally)</label>
    <input type="password" id="apiKeyInput" class="modal-input" placeholder="sk-ant-api03-...">
    <div class="modal-btn-row">
      <button class="modal-btn" onclick="closeSettings()">CANCEL</button>
      <button class="modal-btn save" onclick="saveSettings()">SAVE KEYS</button>
    </div>
  </div>
</div>

<script>
// --- CORE VARIABLES ---
let conversationHistory = [];
let webSearchEnabled = false;
let audioEnabled = false;
let chartCounter = 0; // For unique TV chart IDs

// --- TICKER DATA ---
const TICKERS = [
  {n:"NIFTY 50",p:"24,857",c:"+182",up:true}, {n:"BANKNIFTY",p:"53,412",c:"+341",up:true},
  {n:"INDIA VIX",p:"13.42",c:"-0.85",up:false}, {n:"NASDAQ",p:"17,842",c:"+142",up:true}
];
document.getElementById('tickerTrack').innerHTML = [...TICKERS,...TICKERS].map(d=>
  `<div class="ticker-item"><span class="ticker-name">${d.n}</span> <span class="ticker-price">${d.p}</span> <span class="ticker-change ${d.up?'up':'dn'}">${d.c}</span></div>`
).join('');

// --- SETTINGS (API KEY) ---
function openSettings() {
    document.getElementById('apiKeyInput').value = localStorage.getItem('tandava_api_key') || '';
    document.getElementById('settingsModal').style.display = 'flex';
}
function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
function saveSettings() {
    localStorage.setItem('tandava_api_key', document.getElementById('apiKeyInput').value.trim());
    closeSettings();
    alert("API Key Saved Securely!");
}

// --- TOGGLES (AUDIO & WEB) ---
function toggleWebSearch() {
  webSearchEnabled = !webSearchEnabled;
  document.getElementById('wsToggle').classList.toggle('on', webSearchEnabled);
  document.getElementById('wsLabel').textContent = webSearchEnabled ? 'WEB ON' : 'WEB OFF';
}
function toggleAudio() {
  audioEnabled = !audioEnabled;
  document.getElementById('ttsToggle').classList.toggle('on', audioEnabled);
  document.getElementById('ttsLabel').textContent = audioEnabled ? 'AUDIO ON' : 'AUDIO OFF';
}

// --- TEXT TO SPEECH ---
function speakText(text) {
    if (!audioEnabled || !('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel(); // Stop current speaking
    // Clean text (remove markdown formatting and code blocks for better speech)
    let cleanText = text.replace(/```[\s\S]*?```/g, "Code block omitted.")
                        .replace(/[*#_`]/g, "")
                        .replace(/(https?:\/\/[^\s]+)/g, "link");
    let utterance = new SpeechSynthesisUtterance(cleanText);
    utterance.rate = 1.1; // Slightly faster for pro feel
    utterance.pitch = 0.9;
    window.speechSynthesis.speak(utterance);
}

// --- UI HELPERS ---
const messagesDiv = document.getElementById('messages');
const textarea = document.getElementById('userInput');

function aiAvatar() { return `<svg viewBox="0 0 40 40" fill="none"><polygon points="20,2 38,12 38,28 20,38 2,28 2,12" stroke="#00d4ff" stroke-width="1.5" fill="rgba(0,212,255,0.05)"/><circle cx="20" cy="20" r="5" fill="#00d4ff"/></svg>`; }

function appendMessage(role, content) {
  const w = document.getElementById('welcomeScreen'); if(w) w.remove();
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  msg.innerHTML = `
    <div class="msg-avatar">${role==='assistant'?aiAvatar():'U'}</div>
    <div class="msg-bubble">${content.replace(/\n/g, '<br>')}</div>
  `;
  messagesDiv.appendChild(msg);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
  return msg.querySelector('.msg-bubble');
}

// --- TRADING VIEW INJECTION ---
function injectTradingView(symbol, bubbleElement) {
    chartCounter++;
    const containerId = `tv-chart-${chartCounter}`;
    bubbleElement.innerHTML += `<div id="${containerId}" class="tv-chart-container"></div>`;
    
    new TradingView.widget({
      "autosize": true,
      "symbol": symbol,
      "interval": "15",
      "timezone": "Asia/Kolkata",
      "theme": "dark",
      "style": "1",
      "locale": "en",
      "enable_publishing": false,
      "backgroundColor": "#0a1520",
      "gridColor": "rgba(0, 212, 255, 0.05)",
      "hide_top_toolbar": false,
      "hide_legend": false,
      "save_image": false,
      "container_id": containerId
    });
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

// --- SEND LOGIC ---
textarea.addEventListener('keydown', (e) => {
    if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
});

function quickPrompt(t) { textarea.value = t; sendMessage(); }

async function sendMessage() {
  const text = textarea.value.trim();
  if (!text) return;
  
  // 1. Check if user is asking for a live chart command locally
  const lowerText = text.toLowerCase();
  let chartSymbol = null;
  if(lowerText.includes("chart for nifty")) chartSymbol = "BSE:NIFTY";
  else if(lowerText.includes("chart for banknifty")) chartSymbol = "BSE:BANKNIFTY";
  else if(lowerText.includes("chart for reliance")) chartSymbol = "BSE:RELIANCE";

  appendMessage('user', text);
  textarea.value = '';

  // If local chart command detected, fulfill immediately without API call
  if(chartSymbol) {
      const bub = appendMessage('assistant', `Loading live data for **${chartSymbol}**...`);
      injectTradingView(chartSymbol, bub);
      if(audioEnabled) speakText(`Loading live chart for ${chartSymbol}`);
      return;
  }

  // 2. Perform Standard API Call
  const apiKey = localStorage.getItem('tandava_api_key');
  if(!apiKey) {
      appendMessage('assistant', '⚠️ **SYSTEM HALT:** No API Key found. Please click **⚙️ KEYS** in the top right header to set your Anthropic API key.');
      return;
  }

  const typingMsg = document.createElement('div');
  typingMsg.className = 'msg assistant';
  typingMsg.innerHTML = `<div class="msg-avatar">${aiAvatar()}</div><div class="msg-bubble">Processing...</div>`;
  messagesDiv.appendChild(typingMsg);

  try {
      // Setup payload (simplified for demonstration, adjust model as needed)
      const body = {
          model: 'claude-3-5-sonnet-20240620', // or your preferred model
          max_tokens: 1000,
          messages: [{role: 'user', content: text}]
      };
      
      const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: 'POST',
          headers: {
              'Content-Type': 'application/json',
              'x-api-key': apiKey,
              'anthropic-version': '2023-06-01',
              'anthropic-dangerously-allow-browser': 'true' // Required for client-side fetch
          },
          body: JSON.stringify(body)
      });
      
      const data = await res.json();
      typingMsg.remove();

      if(data.content && data.content[0].text) {
          const reply = data.content[0].text;
          appendMessage('assistant', reply);
          speakText(reply); // Triggers Voice if enabled
      } else {
          appendMessage('assistant', `**Error:** ${data.error?.message || 'Unknown API Error'}`);
      }
  } catch (err) {
      typingMsg.remove();
      appendMessage('assistant', `**Connection Failure:** ${err.message}`);
  }
}

// --- VOICE INPUT ---
function startVoice() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR) { alert("Voice input not supported in this browser."); return; }
    const recognition = new SR();
    recognition.lang = 'en-IN';
    recognition.onstart = () => textarea.placeholder = '// listening...';
    recognition.onresult = (e) => {
        textarea.value = e.results[0][0].transcript;
        sendMessage();
    };
    recognition.onend = () => textarea.placeholder = '// enter command or query...';
    recognition.start();
}

function newChat() { location.reload(); }
</script>
</body>
</html>
