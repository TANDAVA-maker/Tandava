<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TANDAVA AI v3.9 | Touch Optimized</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-void: #020408; --bg-deep: #060d14; --bg-panel: #0a1520; --bg-input: #0d1e2e;
    --accent-cyan: #00d4ff; --text-bright: #e8f4ff; --text-dim: #3a5a78;
    --border: rgba(0, 212, 255, 0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  body { background:var(--bg-void); color:var(--text-bright); font-family:'Rajdhani',sans-serif; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
  
  /* BIGGER HEADER FOR EASIER TAPPING */
  header { display:flex; justify-content:space-between; align-items: center; padding:15px 20px; border-bottom:1px solid var(--border); background:rgba(6,13,20,0.95); z-index:50; flex-shrink: 0; }
  .logo-name { font-family:'Orbitron',monospace; font-size:16px; color:var(--accent-cyan); letter-spacing:2px; }
  
  /* LARGE BUTTON ZONE */
  .hdr-btn { 
    background:var(--bg-input); border:1px solid var(--accent-cyan); color:var(--accent-cyan); 
    padding:10px 18px; cursor:pointer; font-family:'Share Tech Mono'; border-radius:6px; 
    font-size: 14px; font-weight: bold; box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
  }

  #messages { flex:1; overflow-y:auto; padding:20px; padding-bottom: 100px; display:flex; flex-direction:column; gap:15px; }
  .welcome { text-align:center; padding:40px 20px; font-family:'Share Tech Mono'; color:var(--text-dim); }
  
  .msg { display:flex; gap:10px; max-width:85%; animation:fadeIn 0.3s ease; }
  .msg-bubble { padding:12px 16px; border-radius:8px; font-size:15px; background:var(--bg-panel); border:1px solid var(--border); }
  .msg.user { align-self:flex-end; }
  .msg.user .msg-bubble { background:rgba(0, 212, 255, 0.1); border-color:var(--accent-cyan); }

  .input-zone { position: fixed; bottom: 0; left: 0; right: 0; padding:15px 20px; background:var(--bg-deep); border-top:1px solid var(--border); display:flex; gap:10px; z-index:100; }
  #userInput { flex:1; background:var(--bg-input); border:1px solid var(--border); color:white; padding:12px; border-radius:6px; font-size: 16px; outline:none; }
  #sendBtn { background:var(--accent-cyan); border:none; color:black; font-weight:bold; padding:0 20px; border-radius:6px; font-family:'Orbitron'; }

  /* FULL SCREEN MODAL */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; }
  .modal-content { background:var(--bg-panel); border:1px solid var(--accent-cyan); width:92%; max-width: 400px; padding:25px; border-radius:12px; }
  .modal-title { font-family:'Orbitron'; color:var(--accent-cyan); text-align: center; margin-bottom: 15px; }
  .modal-label { font-size:11px; color:var(--text-dim); margin-top:12px; display:block; }
  .modal-input, .modal-select { width:100%; padding:14px; background:var(--bg-input); border:1px solid var(--border); color:white; margin-top:5px; border-radius:6px; font-size: 14px; }
</style>
</head>
<body>

<header>
  <div class="logo-name">TANDAVA 3.9</div>
  <button class="hdr-btn" onclick="openSettings()">⚙️ ENGINE</button>
</header>

<div id="messages">
  <div class="welcome">
    <h2 style="color:var(--accent-cyan);">TRI-ENGINE LOADED</h2>
    <p style="margin-top:10px;">Tap ⚙️ ENGINE above to add key.</p>
    <p style="margin-top:20px; font-size:11px; opacity:0.5;">If button fails, add ?setup=true to URL</p>
  </div>
</div>

<div class="input-zone">
  <input type="text" id="userInput" placeholder="Ask anything...">
  <button id="sendBtn" onclick="sendMessage()">EXECUTE</button>
</div>

<div class="modal-overlay" id="settingsModal">
  <div class="modal-content">
    <div class="modal-title">API CONFIG</div>
    <span class="modal-label">PROVIDER</span>
    <select id="apiProvider" class="modal-select" onchange="updateProviderDefaults()">
      <option value="google">Google Gemini (Free)</option>
      <option value="openrouter">OpenRouter</option>
      <option value="deepseek">DeepSeek</option>
    </select>
    <span class="modal-label">URL</span>
    <input type="text" id="apiUrl" class="modal-input">
    <span class="modal-label">MODEL</span>
    <input type="text" id="apiModel" class="modal-input">
    <span class="modal-label">API KEY</span>
    <input type="password" id="apiKey" class="modal-input" placeholder="Paste sk-... or AIza...">
    <div style="display:flex; gap:10px; margin-top:25px;">
      <button class="hdr-btn" style="flex:1; border-color:var(--text-dim); color:var(--text-dim);" onclick="closeSettings()">CLOSE</button>
      <button class="hdr-btn" style="flex:1;" onclick="saveSettings()">SAVE</button>
    </div>
  </div>
</div>

<script>
let chatHistory = [{ role: "system", content: "You are TANDAVA, an AI trading assistant." }];

window.onload = () => {
    // Check if user forced setup via URL
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('setup')) openSettings();

    document.getElementById('apiProvider').value = localStorage.getItem('tandava_provider') || 'google';
    document.getElementById('apiUrl').value = localStorage.getItem('tandava_url') || 'https://generativelanguage.googleapis.com/v1beta/openai/';
    document.getElementById('apiModel').value = localStorage.getItem('tandava_model') || 'gemini-1.5-flash';
    document.getElementById('apiKey').value = localStorage.getItem('tandava_key') || '';
};

function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }

function updateProviderDefaults() {
    const p = document.getElementById('apiProvider').value;
    const u = document.getElementById('apiUrl');
    const m = document.getElementById('apiModel');
    if (p === 'google') { u.value = 'https://generativelanguage.googleapis.com/v1beta/openai/'; m.value = 'gemini-1.5-flash'; }
    else if (p === 'openrouter') { u.value = 'https://openrouter.ai/api/v1/chat/completions'; m.value = 'deepseek/deepseek-chat'; }
    else { u.value = 'https://api.deepseek.com/v1/chat/completions'; m.value = 'deepseek-chat'; }
}

function saveSettings() {
    localStorage.setItem('tandava_provider', document.getElementById('apiProvider').value);
    localStorage.setItem('tandava_url', document.getElementById('apiUrl').value);
    localStorage.setItem('tandava_model', document.getElementById('apiModel').value);
    localStorage.setItem('tandava_key', document.getElementById('apiKey').value);
    closeSettings();
    alert("Settings Saved!");
}

async function sendMessage() {
    const text = document.getElementById('userInput').value;
    const key = localStorage.getItem('tandava_key');
    if (!key) { alert("Please add API Key first!"); return; }
    
    // Add User Msg
    const msgDiv = document.getElementById('messages');
    msgDiv.innerHTML += `<div class="msg user"><div class="msg-bubble">${text}</div></div>`;
    document.getElementById('userInput').value = '';
    
    try {
        const res = await fetch(localStorage.getItem('tandava_url') + 'chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
            body: JSON.stringify({ model: localStorage.getItem('tandava_model'), messages: [{role:"user", content: text}] })
        });
        const data = await res.json();
        const reply = data.choices[0].message.content;
        msgDiv.innerHTML += `<div class="msg assistant"><div class="msg-bubble">${reply}</div></div>`;
    } catch (e) {
        alert("Error: " + e.message);
    }
}
</script>
</body>
</html>
