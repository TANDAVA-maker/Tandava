<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TANDAVA AI v6.2</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-void: #020408; --bg-panel: #0a1520; --bg-input: #0d1e2e;
    --accent-cyan: #00d4ff; --accent-blue: #0066ff; --text-bright: #e8f4ff;
    --border: rgba(0, 212, 255, 0.15); --glow-cyan: 0 0 15px rgba(0, 212, 255, 0.3);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  
  /* FORCE DARK THEME */
  html, body { background: var(--bg-void) !important; color: var(--text-bright); font-family: 'Rajdhani', sans-serif; height: 100dvh; overflow: hidden; }

  /* NEURAL GRID BACKGROUND */
  body::before {
    content:''; position:fixed; inset:0; z-index:0;
    background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);
    background-size:30px 30px; pointer-events:none;
  }

  header { position:relative; z-index:100; display:flex; justify-content:space-between; align-items:center; padding:12px 20px; border-bottom:1px solid var(--border); background:rgba(6,13,20,0.95); }
  .logo-name { font-family:'Orbitron'; font-size:16px; font-weight:900; color:var(--accent-cyan); letter-spacing:3px; }
  .hdr-btn { background:#0d1e2e; border:1px solid var(--accent-cyan); color:var(--accent-cyan); padding:6px 12px; border-radius:4px; font-family:'Share Tech Mono'; font-size:9px; cursor:pointer; }

  #messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; z-index:10; }
  
  .welcome-area { text-align:center; width:100%; animation: fadeInUp 0.6s ease; margin-top: 10px; }
  @keyframes fadeInUp { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }

  /* FIXED 8-CARD GRID */
  .cap-grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:10px; max-width:450px; margin:20px auto; padding:0 10px; }
  .cap-card { background:rgba(10,21,32,0.9); border:1px solid var(--border); padding:12px 10px; border-radius:8px; cursor:pointer; text-align:left; transition: 0.2s; }
  .cap-card:active { border-color:var(--accent-cyan); box-shadow: var(--glow-cyan); transform: scale(0.96); }
  .cap-icon { font-size:18px; margin-bottom:5px; }
  .cap-label { font-size:10px; font-weight:700; color:var(--accent-cyan); text-transform:uppercase; }
  .cap-desc { font-size:8px; color:#5a7b9a; font-family:'Share Tech Mono'; }

  .input-zone { padding:15px; background:rgba(6,13,20,0.98); border-top:1px solid var(--border); display:flex; gap:10px; z-index:100; position: fixed; bottom: 0; width: 100%; }
  #userInput { flex:1; background:var(--bg-input); border:1px solid var(--border); color:white; padding:12px; border-radius:8px; font-size:16px; outline:none; }
  #sendBtn { background:var(--accent-cyan); border:none; color:black; font-weight:900; padding:0 20px; border-radius:8px; font-family:'Orbitron'; }

  .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center; }
  .modal-box { background:var(--bg-panel); border:2px solid var(--accent-cyan); width:90%; padding:25px; border-radius:15px; }
</style>
</head>
<body>

<header>
  <div class="logo-name">TANDAVA 6.2</div>
  <button class="hdr-btn" onclick="openModal()">// ENGINE CONFIG</button>
</header>

<div id="messages">
  <div class="welcome-area" id="welcome">
    <div style="font-family:'Orbitron'; font-size:24px; color:var(--accent-cyan); margin-bottom:5px;">TANDAVA</div>
    <div style="font-family:'Share Tech Mono'; font-size:9px; color:#5a7b9a; letter-spacing:3px;">NEURAL INTERFACE v6.2</div>
    
    <div class="cap-grid">
      <div class="cap-card" onclick="quickAsk('Nifty Market Summary')">
        <div class="cap-icon">📈</div><div class="cap-label">Live Markets</div><div class="cap-desc">Nifty · BankNifty</div>
      </div>
      <div class="cap-card" onclick="quickAsk('ORB Strategy Logic')">
        <div class="cap-icon">📊</div><div class="cap-label">Trade Strategy</div><div class="cap-desc">ORB · OI · Options</div>
      </div>
      <div class="cap-card" onclick="quickAsk('Write Python for Trading')">
        <div class="cap-icon">⌨️</div><div class="cap-label">Code Helper</div><div class="cap-desc">Python · JS</div>
      </div>
      <div class="cap-card" onclick="quickAsk('இன்றைய சந்தை நிலவரம் என்ன?')">
        <div class="cap-icon">🌐</div><div class="cap-label">Tamil Mode</div><div class="cap-desc">தமிழில் பேசலாம்</div>
      </div>
      <div class="cap-card" onclick="alert('Feature Locked')">
        <div class="cap-icon">📁</div><div class="cap-label">Upload File</div><div class="cap-desc">CSV · PDF</div>
      </div>
      <div class="cap-card" onclick="quickAsk('Latest Market News')">
        <div class="cap-icon">🔍</div><div class="cap-label">Web Search</div><div class="cap-desc">Real-time Intel</div>
      </div>
      <div class="cap-card" onclick="quickAsk('Analyze Greeks')">
        <div class="cap-icon">🧠</div><div class="cap-label">Deep Analysis</div><div class="cap-desc">Research · Math</div>
      </div>
      <div class="cap-card" onclick="alert('Requires HTTPS')">
        <div class="cap-icon">🎙️</div><div class="cap-label">Voice Input</div><div class="cap-desc">Speak to AI</div>
      </div>
    </div>
  </div>
</div>

<div class="input-zone">
  <input type="text" id="userInput" placeholder="// query TANDAVA...">
  <button id="sendBtn" onclick="sendMessage()">GO</button>
</div>

<div class="modal" id="configModal">
  <div class="modal-box">
    <h3 style="color:var(--accent-cyan); font-family:'Orbitron'; text-align:center;">CONFIG</h3>
    <input type="password" id="apiKey" style="width:100%; padding:15px; margin:20px 0; background:#0d1e2e; color:white; border:1px solid var(--accent-cyan); border-radius:8px;" placeholder="Paste Key">
    <button style="width:100%; padding:15px; background:var(--accent-cyan); border:none; font-weight:bold; border-radius:8px;" onclick="saveConfig()">SAVE</button>
  </div>
</div>

<script>
window.onload = () => { document.getElementById('apiKey').value = localStorage.getItem('t_key') || ''; };
function openModal() { document.getElementById('configModal').style.display = 'flex'; }
function saveConfig() { localStorage.setItem('t_key', document.getElementById('apiKey').value.trim()); document.getElementById('configModal').style.display = 'none'; }
function quickAsk(q) { document.getElementById('userInput').value = q; sendMessage(); }

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  const key = localStorage.getItem('t_key');
  if (!text || !key) return;

  document.getElementById('welcome').style.display = 'none';
  const msgDiv = document.getElementById('messages');
  msgDiv.innerHTML += `<div style="align-self:flex-end; background:rgba(0,102,255,0.1); border:1px solid var(--accent-blue); padding:12px; border-radius:8px; margin-bottom:10px; max-width:85%;">${text}</div>`;
  input.value = '';

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
    });
    const data = await res.json();
    const reply = data.candidates ? data.candidates[0].content.parts[0].text : "Check Config.";
    msgDiv.innerHTML += `<div style="background:rgba(10,21,32,0.9); border:1px solid var(--border); padding:12px; border-radius:8px; margin-bottom:10px; max-width:85%;">${reply}</div>`;
    msgDiv.scrollTop = msgDiv.scrollHeight;
  } catch (e) {
    msgDiv.innerHTML += `<div style="color:red; padding:10px;">Error: ${e.message}</div>`;
  }
}
</script>
</body>
</html>
