<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TANDAVA AI v3.8 | Tri-Engine Router</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-void: #020408; --bg-deep: #060d14; --bg-panel: #0a1520; --bg-input: #0d1e2e;
    --accent-cyan: #00d4ff; --accent-blue: #0066ff; --text-bright: #e8f4ff; --text-dim: #3a5a78;
    --border: rgba(0, 212, 255, 0.15); --glow-cyan: 0 0 20px rgba(0, 212, 255, 0.4);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  body { background:var(--bg-void); color:var(--text-bright); font-family:'Rajdhani',sans-serif; height:100dvh; display:flex; flex-direction:column; overflow:hidden; position: relative; }
  
  header { display:flex; justify-content:space-between; align-items: center; padding:12px 20px; border-bottom:1px solid var(--border); background:rgba(6,13,20,0.95); z-index:50; flex-shrink: 0; }
  .logo-name { font-family:'Orbitron',monospace; font-size:18px; color:var(--accent-cyan); letter-spacing:3px; }
  .hdr-btn { background:transparent; border:1px solid var(--border); color:var(--text-dim); padding:8px 14px; cursor:pointer; font-family:'Share Tech Mono'; border-radius:4px; z-index:9999; font-weight: bold; }

  #messages { flex:1; overflow-y:auto; padding:20px; padding-bottom: 90px; display:flex; flex-direction:column; gap:15px; }
  .welcome { text-align:center; padding:40px 20px; font-family:'Share Tech Mono'; color:var(--text-dim); }
  
  .msg { display:flex; gap:10px; max-width:85%; animation:fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }
  .msg.user { align-self:flex-end; flex-direction:row-reverse; }
  .msg.assistant { align-self:flex-start; }
  .msg-bubble { padding:12px 16px; border-radius:8px; font-size:15px; line-height:1.6; background:var(--bg-panel); border:1px solid var(--border); }
  .msg.user .msg-bubble { background:rgba(124,58,237,0.15); border-color:rgba(124,58,237,0.4); }

  .input-zone { position: fixed; bottom: 0; left: 0; right: 0; padding:15px 20px; background:var(--bg-deep); border-top:1px solid var(--border); display:flex; gap:10px; z-index:100; }
  #userInput { flex:1; background:var(--bg-input); border:1px solid var(--border); color:white; padding:12px; border-radius:6px; font-family:'Rajdhani'; outline:none; font-size: 16px; }
  #sendBtn { background:var(--accent-cyan); border:none; color:black; font-weight:bold; padding:0 20px; border-radius:6px; cursor:pointer; font-family: 'Orbitron'; }

  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(2,4,8,0.95); z-index:10000; align-items:center; justify-content:center; }
  .modal-content { background:var(--bg-panel); border:1px solid var(--accent-cyan); width:90%; max-width: 400px; padding:20px; border-radius:8px; box-shadow:var(--glow-cyan); }
  .modal-title { font-family:'Orbitron'; color:var(--accent-cyan); font-size:16px; margin-bottom:15px; text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
  .modal-label { font-size:11px; color:var(--text-dim); font-family:'Share Tech Mono'; margin-top:12px; display:block; }
  .modal-input, .modal-select { width:100%; padding:10px; background:var(--bg-input); border:1px solid var(--border); color:white; margin-top:4px; border-radius:4px; font-family:'Share Tech Mono'; font-size: 13px; }
</style>
</head>
<body>

<header>
  <div class="logo-name">TANDAVA // 3.8</div>
  <button class="hdr-btn" onclick="openSettings()" ontouchstart="openSettings()">⚙️ ENGINE</button>
</header>

<div id="messages">
  <div class="welcome">
    <h2 style="color:var(--accent-cyan); font-family:'Orbitron';">TRI-ENGINE ROUTER</h2>
    <p style="margin-top:10px;">// SYSTEM STATUS: ARMED</p>
    <p>// REGION: VILUPPURAM, TN</p>
    <p style="margin-top:20px; font-size:12px;">Go to ⚙️ ENGINE to select Google Gemini, OpenRouter, or DeepSeek.</p>
  </div>
</div>

<div class="input-zone">
  <input type="text" id="userInput" placeholder="Ask TANDAVA anything...">
  <button id="sendBtn" onclick="sendMessage()">EXECUTE</button>
</div>

<div class="modal-overlay" id="settingsModal">
  <div class="modal-content">
    <div class="modal-title">API ROUTER CONFIG</div>
    
    <span class="modal-label">PROVIDER</span>
    <select id="apiProvider" class="modal-select" onchange="updateProviderDefaults()">
      <option value="google">Google Gemini (Recommended / Free)</option>
      <option value="openrouter">OpenRouter (Works in India)</option>
      <option value="deepseek">DeepSeek (Standard)</option>
    </select>

    <span class="modal-label">API ENDPOINT URL</span>
    <input type="text" id="apiUrl" class="modal-input">

    <span class="modal-label">MODEL NAME</span>
    <input type="text" id="apiModel" class="modal-input">

    <span class="modal-label">API KEY (Stored Locally)</span>
    <input type="password" id="apiKey" class="modal-input" placeholder="Paste your key here...">

    <div style="display:flex; gap:10px; margin-top:20px;">
      <button class="hdr-btn" style="flex:1;" onclick="closeSettings()">CANCEL</button>
      <button class="hdr-btn" style="flex:1; border-color:var(--accent-cyan); color:var(--accent-cyan);" onclick="saveSettings()">SAVE</button>
    </div>
  </div>
</div>

<script>
let chatHistory = [{ role: "system", content: "You are TANDAVA, an elite AI trading assistant. Provide clear trading math and market analysis." }];

window.onload = () => {
    // Force set defaults if first time
    if(!localStorage.getItem('tandava_provider')) updateProviderDefaults();
    
    document.getElementById('apiProvider').value = localStorage.getItem('tandava_provider') || 'google';
    document.getElementById('apiUrl').value = localStorage.getItem('tandava_url') || 'https://generativelanguage.googleapis.com/v1beta/openai/';
    document.getElementById('apiModel').value = localStorage.getItem('tandava_model') || 'gemini-3.1-flash-preview';
    document.getElementById('apiKey').value = localStorage.getItem('tandava_key') || '';
};
