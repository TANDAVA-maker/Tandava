<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TANDAVA 4.7 | Touch Active</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
<style>
  :root { --bg-void: #020408; --accent-cyan: #00d4ff; --border: rgba(0, 212, 255, 0.3); }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  body { background:var(--bg-void); color:#e8f4ff; font-family:'Rajdhani',sans-serif; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
  
  header { display:flex; justify-content:space-between; align-items: center; padding:15px 20px; border-bottom:1px solid var(--border); background:#060d14; z-index:9999; }
  .logo-name { font-family:'Orbitron'; font-size:16px; color:var(--accent-cyan); }
  
  /* SUPER TAPPABLE BUTTONS */
  .hdr-btn { 
    background:#0d1e2e; border:2px solid var(--accent-cyan); color:var(--accent-cyan); 
    padding:12px 20px; cursor:pointer; border-radius:8px; font-weight: bold; 
    z-index: 10000; position: relative;
  }

  #messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:15px; z-index: 1; }
  
  .msg-bubble { padding:14px; border-radius:10px; background:#0a1520; border:1px solid var(--border); max-width: 85%; }
  .msg.user { align-self: flex-end; border-color: var(--accent-cyan); background: rgba(0,212,255,0.1); }

  .input-zone { padding:15px; background:#060d14; border-top:1px solid var(--border); display:flex; gap:10px; z-index:9999; }
  #userInput { flex:1; background:#0d1e2e; border:1px solid var(--border); color:white; padding:15px; border-radius:8px; font-size: 16px; }
  
  #sendBtn { 
    background:var(--accent-cyan); border:none; color:black; font-weight:bold; 
    padding:0 25px; border-radius:8px; font-family:'Orbitron'; 
    z-index: 10000; position: relative;
  }

  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:20000; align-items:center; justify-content:center; }
  .modal-content { background:#0a1520; border:2px solid var(--accent-cyan); width:90%; padding:25px; border-radius:15px; }
  .modal-input { width:100%; padding:15px; background:#0d1e2e; color:white; border:1px solid var(--border); margin-top:10px; border-radius:8px; }
</style>
</head>
<body>

<header>
  <div class="logo-name">TANDAVA 4.7</div>
  <button class="hdr-btn" onclick="openSettings()" ontouchstart="openSettings()">⚙️ ENGINE</button>
</header>

<div id="messages">
  <div style="text-align:center; color:var(--accent-cyan); margin-top:50px;">
    <h3>TOUCH ENGINE ACTIVE</h3>
    <p style="font-size:12px; margin-top:10px; opacity:0.6;">Try tapping ENGINE or typing below.</p>
  </div>
</div>

<div class="input-zone">
  <input type="text" id="userInput" placeholder="Type here...">
  <button id="sendBtn" onclick="sendMessage()" ontouchstart="sendMessage()">EXECUTE</button>
</div>

<div class="modal-overlay" id="settingsModal">
  <div class="modal-content">
    <h3 style="color:var(--accent-cyan); text-align:center;">CONFIG</h3>
    <input type="text" id="apiUrl" class="modal-input" placeholder="URL">
    <input type="text" id="apiModel" class="modal-input" placeholder="Model">
    <input type="password" id="apiKey" class="modal-input" placeholder="Paste Key">
    <div style="display:flex; gap:10px; margin-top:20px;">
      <button class="hdr-btn" style="flex:1;" onclick="closeSettings()" ontouchstart="closeSettings()">CLOSE</button>
      <button class="hdr-btn" style="flex:1;" onclick="saveSettings()" ontouchstart="saveSettings()">SAVE</button>
    </div>
  </div>
</div>

<script>
window.onload = () => {
    document.getElementById('apiUrl').value = localStorage.getItem('t_url') || 'https://generativelanguage.googleapis.com/v1beta/openai/chat/completions';
    document.getElementById('apiModel').value = localStorage.getItem('t_model') || 'gemini-1.5-flash';
    document.getElementById('apiKey').value = localStorage.getItem('t_key') || '';
};

function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }

function saveSettings() {
    localStorage.setItem('t_url', document.getElementById('apiUrl').value.trim());
    localStorage.setItem('t_model', document.getElementById('apiModel').value.trim());
    localStorage.setItem('t_key', document.getElementById('apiKey').value.trim());
    closeSettings();
    alert("Saved!");
}

async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    const msgDiv = document.getElementById('messages');
    msgDiv.innerHTML += `<div class="msg user"><div class="msg-bubble">${text}</div></div>`;
    input.value = '';

    try {
        const response = await fetch(localStorage.getItem('t_url'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('t_key')}` },
            body: JSON.stringify({ 
                model: localStorage.getItem('t_model'), 
                messages: [{role: "user", content: text}],
                stream: false 
            })
        });
        const data = await response.json();
        let reply = (data.choices && data.choices[0]) ? data.choices[0].message.content : "Error: Check Config";
        msgDiv.innerHTML += `<div class="msg assistant"><div class="msg-bubble">${reply}</div></div>`;
        msgDiv.scrollTop = msgDiv.scrollHeight;
    } catch (e) {
        msgDiv.innerHTML += `<div class="msg assistant"><div class="msg-bubble" style="color:red;">Error: ${e.message}</div></div>`;
    }
}
</script>
</body>
</html>
